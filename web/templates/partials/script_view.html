{% if not lines %}
  <div class="mp-subtle text-sm">Script file unavailable.</div>
{% else %}
  <div class="space-y-3">
    {% for line in lines %}
      <div class="flex gap-3">
        <div class="shrink-0 w-16 text-right mp-numeric text-xs pt-1
                    {% if line.speaker == 'S1' %}text-[color:var(--mp-accent)]{% else %}text-[color:var(--mp-secondary)]{% endif %}">
          {{ line.speaker_name }}{% if line.emotion %}<div class="mp-subtle text-[10px]">{{ line.emotion }}</div>{% endif %}
        </div>
        <div class="flex-1 text-[color:var(--mp-ink)] leading-relaxed text-[0.95rem]">
          {{ line.text }}
        </div>
      </div>
    {% endfor %}
  </div>
{% endif %}
